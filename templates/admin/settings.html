{% extends "base.html" %}
{% block title %}Настройки{% endblock %}
{% block page_title %}Настройки{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;">
  <div class="card-header"><span class="card-header-title">Смена пароля сотрудников</span></div>
  <div class="card-body">
    <div id="settingsError" class="error-list"><ul></ul></div>
    <div id="settingsSuccess" style="display:none;background:rgba(25,135,84,.08);border:1px solid rgba(25,135,84,.25);border-radius:8px;padding:12px 16px;color:var(--success);font-size:14px;margin-bottom:16px;">
      Пароль успешно изменён
    </div>

    <div style="margin-bottom:16px;">
      <label class="form-label">Текущий пароль</label>
      <input type="password" id="oldPass" class="form-control" placeholder="••••••••">
    </div>
    <div style="margin-bottom:16px;">
      <label class="form-label">Новый пароль</label>
      <input type="password" id="newPass" class="form-control" placeholder="Минимум 4 символа">
    </div>
    <div style="margin-bottom:24px;">
      <label class="form-label">Подтвердите новый пароль</label>
      <input type="password" id="confirmPass" class="form-control" placeholder="Повторите пароль">
    </div>

    <button class="btn-accent" id="changePassBtn" onclick="changePassword()">
      <i class="bi bi-key"></i> Изменить пароль
    </button>

    <!-- <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);font-size:13px;color:var(--text-muted);line-height:1.6;">
      <strong>Важно:</strong> после перезапуска сервера пароль вернётся к значению из файла
      <code>config.py</code>. Для постоянной смены — обновите <code>USER_PASSWORD_HASH</code> в этом файле
      командой в терминале:<br>
      <code style="display:block;margin-top:8px;background:var(--bg);padding:8px 10px;border-radius:6px;">
        python -c "from config import hash_password; print(hash_password('новый_пароль'))"
      </code>
    </div> -->
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function changePassword() {
  const btn = document.getElementById('changePassBtn');
  clearErrors(document.getElementById('settingsError').closest('.card-body') || document);
  document.getElementById('settingsSuccess').style.display = 'none';

  const body = {
    old_password: document.getElementById('oldPass').value,
    new_password: document.getElementById('newPass').value,
    confirm:      document.getElementById('confirmPass').value,
  };

  btn.disabled = true;
  const { ok, data } = await api('POST', '/admin/api/change-password', body);
  btn.disabled = false;

  if (ok) {
    document.getElementById('settingsSuccess').style.display = 'block';
    document.getElementById('oldPass').value = '';
    document.getElementById('newPass').value = '';
    document.getElementById('confirmPass').value = '';
  } else {
    showErrors(data.errors || [{ field: '', message: 'Ошибка' }]);
  }
}
</script>
{% endblock %}
