<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Автосервис</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">Автосервис</div>
    <h1 class="login-title">Вход в систему</h1>

    <div class="login-toggle">
      <button id="btnUser" class="active" onclick="setMode('user')">Сотрудник</button>
      <button id="btnAdmin" onclick="setMode('admin')">Администратор</button>
    </div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div id="loginField" style="display:none; margin-bottom: 16px;">
        <label class="form-label">Логин</label>
        <input type="text" name="login" class="form-control" placeholder="admin" autocomplete="username">
      </div>
      <div style="margin-bottom: 20px;">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-accent" style="width:100%; justify-content:center;">
        Войти <i class="bi bi-arrow-right"></i>
      </button>
    </form>
  </div>
</div>
<script>
function setMode(mode) {
  const isAdmin = mode === 'admin';
  document.getElementById('loginField').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('btnUser').classList.toggle('active', !isAdmin);
  document.getElementById('btnAdmin').classList.toggle('active', isAdmin);
}
</script>
</body>
</html>
